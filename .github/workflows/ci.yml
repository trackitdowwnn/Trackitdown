# WHAT:  CI pipeline — lint, typecheck, and test on every push and PR.
# WHY:   An AI writes most of this code fast; CI is the deterministic
#        backstop that keeps main green. Tier 1 tests (money/safety)
#        must pass here — see docs/TESTING.md.
# LINKS: docs/TESTING.md, package.json scripts (lint, typecheck, test).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --ci --coverage

      # Enforces docs/COMMENTING_STANDARDS.md: every source file must open
      # with a WHAT/WHY header. A missing header is a failing build.
      - name: File header check
        run: node scripts/check-file-headers.mjs

      # Fails the build if any committed file contains obvious secrets.
      # Lightweight guard — not a replacement for proper secret scanning.
      - name: Basic secret scan
        run: |
          if grep -rInE "(sk_live_|service_role|SUPABASE_SERVICE_ROLE)" \
            --include="*.ts" --include="*.tsx" --include="*.json" \
            --exclude-dir=node_modules . ; then
            echo "::error::Possible secret committed — see matches above."
            exit 1
          fi
